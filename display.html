<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anton Uniforms — Manager Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --bg:#f2f2f7;--card:#ffffff;
  --sep:rgba(60,60,67,0.12);--sep2:rgba(60,60,67,0.06);
  --label:#000;--label2:rgba(60,60,67,0.6);--label3:rgba(60,60,67,0.3);
  --blue:#007AFF;--blue-light:rgba(0,122,255,0.1);
  --green:#34C759;--green-light:rgba(52,199,89,0.1);
  --red:#FF3B30;--red-light:rgba(255,59,48,0.1);
  --orange:#FF9500;--orange-light:rgba(255,149,0,0.1);
  --purple:#AF52DE;--purple-light:rgba(175,82,222,0.1);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --radius:14px;--radius-sm:8px;
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--card);border-bottom:0.5px solid var(--sep);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-mark{width:34px;height:34px;background:linear-gradient(145deg,#B8860B,#DAA520);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.hdr-title{font-size:17px;font-weight:800;color:var(--label);letter-spacing:-0.3px}
.hdr-sub{font-size:11px;color:var(--label2);letter-spacing:0.2px;margin-top:1px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.hdr-clock{font-size:18px;font-weight:300;color:var(--label);font-variant-numeric:tabular-nums;letter-spacing:0.3px}
.hdr-count{font-size:11px;font-weight:700;color:var(--label2);text-align:right}
.hdr-count-num{color:var(--blue)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:10px 12px 40px}
.scroll::-webkit-scrollbar{display:none}

/* EMPTY */
.empty{text-align:center;padding:80px 20px}
.empty-ico{font-size:44px;opacity:.25;margin-bottom:12px}
.empty-txt{font-size:16px;font-weight:600;color:var(--label3)}
.empty-sub{font-size:13px;color:var(--label3);margin-top:4px}

/* ORDER CARD */
.order-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;display:flex;animation:cardIn .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.card-accent{width:4px;flex-shrink:0}
.card-accent.nostock{background:var(--red)}
.card-accent.ready-partial{background:var(--orange)}
.card-accent.ready{background:var(--green)}
.card-accent.retrieving{background:var(--blue)}
.card-accent.requested{background:var(--label3)}

.card-body{flex:1;padding:13px 14px;min-width:0}

/* CARD TOP ROW */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-family{font-size:18px;font-weight:800;color:var(--label);letter-spacing:-0.3px;line-height:1.2}
.card-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.2px;white-space:nowrap;flex-shrink:0}
.card-badge.nostock{background:var(--red-light);color:var(--red)}
.card-badge.ready-partial{background:var(--orange-light);color:var(--orange)}
.card-badge.ready{background:var(--green-light);color:var(--green)}
.card-badge.retrieving{background:var(--blue-light);color:var(--blue)}
.card-badge.requested{background:rgba(60,60,67,0.07);color:var(--label2)}

/* CARD META */
.card-meta{font-size:12px;color:var(--label2);margin-bottom:10px;line-height:1.5}
.card-meta-sep{margin:0 4px;opacity:.4}

/* DIVIDER */
.card-divider{height:0.5px;background:var(--sep2);margin:8px 0}

/* ITEMS LIST */
.card-items{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.item-row{display:flex;align-items:baseline;gap:6px;font-size:13px;line-height:1.5}
.item-dot{color:var(--label3);flex-shrink:0}
.item-type{font-weight:600;color:var(--label)}
.item-sep{color:var(--label3);font-size:11px}
.item-color{color:var(--label2)}
.item-sizes{color:var(--label2)}
.item-qty{color:var(--label);font-weight:600;font-size:11px;background:rgba(60,60,67,0.07);padding:1px 6px;border-radius:10px}
.item-patch{font-size:10px;font-weight:700;color:var(--purple);background:var(--purple-light);padding:1px 6px;border-radius:10px}
.item-blank{font-size:10px;font-weight:700;color:var(--label3);background:rgba(60,60,67,0.07);padding:1px 6px;border-radius:10px}
.item-note{font-size:11px;color:var(--label2);font-style:italic;margin-left:14px;margin-top:1px}

/* UNABLE ITEMS */
.unable-section{background:var(--red-light);border-radius:var(--radius-sm);padding:9px 11px;margin-top:8px}
.unable-label{font-size:11px;font-weight:700;color:var(--red);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:5px}
.unable-row{font-size:12px;color:var(--red);line-height:1.6}
.unable-sku{font-family:monospace;font-size:10px;opacity:.7;margin-left:4px}

/* SORT PILLS */
.sort-bar{background:var(--card);border-bottom:0.5px solid var(--sep);padding:8px 12px;display:flex;gap:6px;flex-shrink:0;position:sticky;top:62px;z-index:99}
.sort-pill{padding:5px 14px;border-radius:20px;border:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--label2);background:rgba(60,60,67,0.07);cursor:pointer;transition:all .15s}
.sort-pill.active{background:var(--blue);color:#fff}
.sort-pill:active{transform:scale(0.96)}

/* ACTIONS */
.card-actions{margin-top:10px;display:flex;gap:8px}
.action-btn{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.action-btn:active{transform:scale(0.97)}
.btn-dismiss{background:rgba(60,60,67,0.08);color:var(--label2)}
.btn-grabbed{background:var(--green-light);color:var(--green)}
.btn-nostock-dismiss{background:var(--red-light);color:var(--red)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-mark">AU</div>
    <div>
      <div class="hdr-title">Order Dashboard</div>
      <div class="hdr-sub">Manager View</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="hdr-clock" id="hdr-clock">--:--</div>
    <div class="hdr-count" id="hdr-count"></div>
  </div>
</div>

<div class="sort-bar">
  <button class="sort-pill active" data-sort="status">Status</button>
  <button class="sort-pill" data-sort="time">Time</button>
  <button class="sort-pill" data-sort="az">A–Z</button>
</div>

<div class="scroll">
  <div id="order-list">
    <div class="empty">
      <div class="empty-ico">🏫</div>
      <div class="empty-txt">No Active Orders</div>
      <div class="empty-sub">Orders will appear here as sales reps submit them</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyC6zm-642fbrpKRknIhJkTUm1esUsXDTHQ",
  authDomain:"anton-uniforms.firebaseapp.com",
  databaseURL:"https://anton-uniforms-default-rtdb.firebaseio.com",
  projectId:"anton-uniforms",
  storageBucket:"anton-uniforms.firebasestorage.app",
  messagingSenderId:"539546407658",
  appId:"1:539546407658:web:1b76e5334f7f87e6103d93"
});

const db = getDatabase(app), auth = getAuth(app);
const reqRef = ref(db, 'requests');
signInAnonymously(auth).catch(() => {});

const READY_EXPIRE_MS   = 5  * 60 * 1000;
const NOSTOCK_EXPIRE_MS = 20 * 60 * 1000;
let liveRequests = {};
let sortMode = 'status';

document.querySelectorAll('.sort-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    sortMode = pill.dataset.sort;
    document.querySelectorAll('.sort-pill').forEach(p => p.classList.toggle('active', p === pill));
    render();
  });
});

// Clock — updates every second, no re-render
function updateClock(){
  document.getElementById('hdr-clock').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// Auto-expire check every 30s
setInterval(checkExpired, 30000);

// Re-render only on Firebase changes
onValue(reqRef, snap => { liveRequests = snap.val() || {}; render(); });

function checkExpired(){
  const now = Date.now();
  Object.entries(liveRequests).forEach(([key, r]) => {
    const readyExpired  = r.status === 'ready'    && r.completedAt && (now - r.completedAt)  >= READY_EXPIRE_MS;
    const nostockExpired= r.status === 'nostock'  && r.noStockAt   && (now - r.noStockAt)    >= NOSTOCK_EXPIRE_MS;
    if (readyExpired || nostockExpired) remove(ref(db, 'requests/' + key)).catch(() => {});
  });
}

function timeAgo(ts){
  if (!ts) return '';
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'just now';
  return m + ' min ago';
}

function cardClass(r){
  if (r.status === 'nostock') return 'nostock';
  if (r.status === 'ready' && r.isPartial) return 'ready-partial';
  if (r.status === 'ready') return 'ready';
  if (r.status === 'retrieving') return 'retrieving';
  return 'requested';
}

function statusLabel(r){
  if (r.status === 'nostock')                  return '🚫 No Stock';
  if (r.status === 'ready' && r.isPartial)     return '⚠ Partial Ready';
  if (r.status === 'ready')                    return '✓ Ready';
  if (r.status === 'retrieving') return r.claimedBy ? '↗ ' + r.claimedBy + ' is picking' : '↗ Being Picked';
  return '⏳ In Queue';
}

function renderItems(items){
  if (!items || !items.length) return '';
  return items.map(item => {
    const type  = esc(item.productTitle || item.itemType || '');
    const color = item.color ? `<span class="item-sep">·</span><span class="item-color">${esc(item.color)}</span>` : '';
    const sizes = item.sizes && item.sizes.length ? `<span class="item-sep">·</span><span class="item-sizes">${esc(item.sizes.join(', '))}</span>` : '';
    const qty   = item.qty && item.qty > 1 ? `<span class="item-qty">×${item.qty}</span>` : '';
    const patch = item.needsPatch == null ? '' : (item.needsPatch ? '<span class="item-patch">+Patch</span>' : '<span class="item-blank">Blank</span>');
    const note  = item.notes ? `<div class="item-note">${esc(item.notes)}</div>` : '';
    return `<div>
      <div class="item-row">
        <span class="item-dot">•</span>
        <span class="item-type">${type}</span>${color}${sizes}${qty}${patch}
      </div>${note}
    </div>`;
  }).join('');
}

function renderUnable(r){
  const items = r.unableItems;
  if (!items || !items.length) return '';
  const rows = items.map(it => {
    const name  = esc(it.productTitle || it.itemType || '');
    const color = it.color ? ` — ${esc(it.color)}` : '';
    const size  = it.size  ? ` · Size ${esc(it.size)}` : '';
    const sku   = it.sku   ? `<span class="unable-sku">${esc(it.sku)}</span>` : '';
    return `<div class="unable-row">• ${name}${color}${size}${sku}</div>`;
  }).join('');
  const label = r.status === 'nostock' ? 'Out of Stock' : 'Could Not Pick';
  return `<div class="unable-section"><div class="unable-label">${label}</div>${rows}</div>`;
}

function render(){
  const list = document.getElementById('order-list');
  const now  = Date.now();

  const orders = Object.entries(liveRequests)
    .map(([key, val]) => ({key, ...val}))
    .filter(r => {
      if (r.status === 'ready'   && r.completedAt && (now - r.completedAt)  >= READY_EXPIRE_MS)   return false;
      if (r.status === 'nostock' && r.noStockAt   && (now - r.noStockAt)    >= NOSTOCK_EXPIRE_MS) return false;
      return true;
    });

  if (orders.length === 0){
    list.innerHTML = `<div class="empty"><div class="empty-ico">🏫</div><div class="empty-txt">No Active Orders</div><div class="empty-sub">Orders will appear here as sales reps submit them</div></div>`;
    document.getElementById('hdr-count').textContent = '';
    return;
  }

  const priority = {nostock:0, 'ready-partial':1, ready:2, retrieving:3, requested:4};
  orders.sort((a, b) => {
    if (sortMode === 'time') return (a.timestamp || 0) - (b.timestamp || 0);
    if (sortMode === 'az')   return (a.familyName || '').localeCompare(b.familyName || '');
    // default: status priority, then time within same status
    const pa = priority[cardClass(a)] ?? 5;
    const pb = priority[cardClass(b)] ?? 5;
    if (pa !== pb) return pa - pb;
    return (a.timestamp || 0) - (b.timestamp || 0);
  });

  const needsAttn = orders.filter(r => r.status === 'nostock' || (r.status === 'ready' && r.isPartial)).length;
  const countEl = document.getElementById('hdr-count');
  countEl.innerHTML = `<span class="hdr-count-num">${orders.length}</span> active${needsAttn ? ` · <span style="color:var(--red);font-weight:700">${needsAttn} need attention</span>` : ''}`;

  list.innerHTML = orders.map(r => {
    const cls   = cardClass(r);
    const items = r.items || [];
    const school = items[0]?.school || '—';
    const unable = renderUnable(r);

    let actions = '';
    if (r.status === 'ready' && !r.isPartial){
      actions = `<div class="card-actions"><button class="action-btn btn-grabbed" data-key="${esc(r.key)}">Grabbed ✓</button></div>`;
    } else if (r.status === 'ready' && r.isPartial){
      actions = `<div class="card-actions"><button class="action-btn btn-grabbed" data-key="${esc(r.key)}">Grabbed ✓</button></div>`;
    } else if (r.status === 'nostock'){
      actions = `<div class="card-actions"><button class="action-btn btn-nostock-dismiss" data-key="${esc(r.key)}">Dismiss</button></div>`;
    }

    return `<div class="order-card">
      <div class="card-accent ${cls}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-family">${esc(r.familyName || '—')}</div>
          <div class="card-badge ${cls}">${statusLabel(r)}</div>
        </div>
        <div class="card-meta">
          ${esc(school)}<span class="card-meta-sep">·</span>Rep: ${esc(r.salesperson || r.salespersonName || '—')}<span class="card-meta-sep">·</span>${timeAgo(r.timestamp)}
        </div>
        <div class="card-divider"></div>
        <div class="card-items">${renderItems(items)}</div>
        ${r.notes ? `<div class="item-note" style="margin-left:0;font-size:12px">📝 ${esc(r.notes)}</div>` : ''}
        ${unable}
        ${actions}
      </div>
    </div>`;
  }).join('');

  // Event delegation for dismiss/grabbed buttons
  list.querySelectorAll('.action-btn[data-key]').forEach(btn => {
    btn.addEventListener('click', () => dismiss(btn.dataset.key));
  });
}

async function dismiss(key){
  try { await remove(ref(db, 'requests/' + key)); }
  catch(e) { console.error('dismiss failed', e); }
}

function esc(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
